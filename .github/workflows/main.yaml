name: Anchor CI/CD

on:
  push:
    branches: [ "main" ]
  # Allows you to run this manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Weekly security rebuild every Monday

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      # Opting into Node.js 24 to clear deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4 is stable; the env flag handles the Node version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6 # Upgraded to v6 for better Node 24 support
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/anchor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/anchor:${{ github.run_number }}